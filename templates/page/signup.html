<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — VC Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#5046E5;--accent-hover:#3F37C9;--accent-light:#EEEDFD}
    body{font-family:'DM Sans',system-ui,sans-serif;background:linear-gradient(180deg,#F8F8FC 0%,#EEEDFD 100%);min-height:100vh;display:grid;place-items:center;padding:24px}

    .auth-card{
        background:#fff;border-radius:24px;width:100%;max-width:440px;
        padding:44px 40px 36px;
        box-shadow:0 4px 6px rgba(0,0,0,.02),0 20px 60px rgba(80,70,229,.08);
    }

    .auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
    .auth-logo-mark{
        width:40px;height:40px;border-radius:12px;
        background:var(--accent);color:#fff;
        display:grid;place-items:center;
        font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;
    }
    .auth-logo-text{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#111}

    .auth-header{text-align:center;margin-bottom:24px}
    .auth-header h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#111;margin-bottom:6px}
    .auth-header p{font-size:14px;color:#888}

    .social-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
    .social-btn{
        display:flex;align-items:center;justify-content:center;gap:10px;
        padding:12px;border:1.5px solid #e8e8e8;border-radius:12px;
        background:#fff;font-size:14px;font-weight:600;color:#333;
        cursor:pointer;transition:.2s;font-family:inherit;
    }
    .social-btn:hover{border-color:#ccc;background:#fafafa}

    .divider{display:flex;align-items:center;gap:16px;margin-bottom:22px;font-size:13px;color:#bbb}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}

    .form-group{margin-bottom:16px}
    .form-label{font-size:13px;font-weight:600;color:#333;display:block;margin-bottom:6px}
    .form-input{
        width:100%;padding:13px 16px;font-size:14px;font-family:inherit;
        border:1.5px solid #e8e8e8;border-radius:12px;color:#111;
        outline:none;transition:.2s;background:#fff;
    }
    .form-input::placeholder{color:#bbb}
    .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
    .input-wrap{position:relative}
    .toggle-pw{
        position:absolute;right:14px;top:50%;transform:translateY(-50%);
        background:none;border:none;font-size:12px;font-weight:600;
        color:#aaa;cursor:pointer;font-family:inherit;
    }
    .toggle-pw:hover{color:var(--accent)}

    .terms{display:flex;align-items:center;gap:10px;margin:20px 0 6px;font-size:13px;color:#555}
    .terms input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
    .terms a{color:var(--accent);font-weight:600;text-decoration:none}
    .terms a:hover{text-decoration:underline}

    .submit-btn{
        width:100%;padding:14px;font-size:15px;font-weight:700;
        background:var(--accent);color:#fff;border:none;
        border-radius:12px;cursor:pointer;font-family:inherit;
        transition:.2s;margin-top:6px;
    }
    .submit-btn:hover{background:var(--accent-hover);box-shadow:0 8px 24px rgba(80,70,229,.25)}

    .auth-footer{text-align:center;margin-top:22px;font-size:13px;color:#888}
    .auth-footer a{color:#111;font-weight:700;text-decoration:none}
    .auth-footer a:hover{text-decoration:underline}
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">
        <div class="auth-logo-mark">VC</div>
        <span class="auth-logo-text">VC Shop</span>
    </div>

    <div class="auth-header">
        <h1>Create an account</h1>
        <p>Join VC Shop for the best experience</p>
    </div>

    <div class="social-row">
        <button class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
        </button>
        <button class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#111"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            Apple
        </button>
    </div>

    <div class="divider">or</div>

    <form>
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" placeholder="Jane Doe" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
                <input type="password" class="form-input" placeholder="Min 8 characters" id="pw1" required>
                <button type="button" class="toggle-pw" onclick="togglePw('pw1',this)">Show</button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrap">
                <input type="password" class="form-input" placeholder="••••••••" id="pw2" required>
            </div>
        </div>
        <label class="terms">
            <input type="checkbox" required>
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
        <button type="submit" class="submit-btn">Create Account</button>
    </form>

    <div class="auth-footer">Already have an account? <a href="{{ url_for('front.login') }}">Sign in</a></div>
</div>

<script>
function togglePw(id,btn){const i=document.getElementById(id);if(i.type==='password'){i.type='text';btn.textContent='Hide'}else{i.type='password';btn.textContent='Show'}}
</script>
</body>
</html>
