<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VC Shop — Admin{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

  <!-- Tailwind (utility classes used in some components) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Admin CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />

  {% block extra_head %}{% endblock %}
</head>
<body>

{% block body %}{% endblock %}

<!-- Admin JS -->
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
