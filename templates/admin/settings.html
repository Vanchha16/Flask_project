{% extends "admin/layout/master.html" %}
{% block title %}Settings — VC Shop Admin{% endblock %}
{% block page_title %}Settings{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-text"><h1>Settings</h1><p>Manage your store settings.</p></div>
  <button class="btn-primary" onclick="showToast('Settings saved')">Save Changes</button>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

  <!-- Store Info -->
  <div class="table-card" style="padding:24px">
    <div class="table-header" style="margin-bottom:20px"><span class="table-title">Store Information</span></div>
    <div class="form-group">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px">Store Name</label>
      <input type="text" class="form-input" value="VC Shop" style="width:100%">
    </div>
    <div class="form-group" style="margin-top:16px">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px">Store Email</label>
      <input type="email" class="form-input" value="admin@vcshop.com" style="width:100%">
    </div>
    <div class="form-group" style="margin-top:16px">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px">Currency</label>
      <select class="form-input" style="width:100%"><option selected>USD ($)</option><option>EUR (€)</option><option>GBP (£)</option></select>
    </div>
  </div>

  <!-- Admin Account -->
  <div class="table-card" style="padding:24px">
    <div class="table-header" style="margin-bottom:20px"><span class="table-title">Admin Account</span></div>
    <div class="form-group">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px">Display Name</label>
      <input type="text" class="form-input" value="Admin User" style="width:100%">
    </div>
    <div class="form-group" style="margin-top:16px">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px">Email Address</label>
      <input type="email" class="form-input" value="admin@vcshop.com" style="width:100%">
    </div>
    <div class="form-group" style="margin-top:16px">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px">New Password</label>
      <input type="password" class="form-input" placeholder="Leave blank to keep current" style="width:100%">
    </div>
  </div>

</div>
{% endblock %}
